<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KBee Realtime Voice POC</title>
    <style>
      body {
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica,
          Arial, sans-serif;
        max-width: 860px;
        margin: 2rem auto;
        padding: 0 1rem;
        line-height: 1.5;
      }
      button {
        margin-right: 0.5rem;
        padding: 0.5rem 0.9rem;
        cursor: pointer;
      }
      #log {
        margin-top: 1rem;
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 0.8rem;
        height: 360px;
        overflow-y: auto;
        white-space: pre-wrap;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 13px;
      }
      .row {
        margin: 0.4rem 0;
      }
      #status {
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <h1>KBee Realtime Voice POC</h1>
    <p>使用麥克風和 AI 客服對話，AI 可透過 RAG 查詢 KB。</p>
    <div class="row">
      <button id="startBtn">Start Session</button>
      <button id="stopBtn" disabled>Stop Session</button>
      <span id="status">Idle</span>
    </div>
    <div class="row">
      <label for="voiceSelect">Voice:</label>
      <select id="voiceSelect">
        <option value="alloy" selected>alloy</option>
        <option value="verse">verse</option>
        <option value="sage">sage</option>
      </select>
    </div>
    <audio id="remoteAudio" autoplay></audio>
    <div id="log"></div>

    <script>
      const startBtn = document.getElementById("startBtn");
      const stopBtn = document.getElementById("stopBtn");
      const statusEl = document.getElementById("status");
      const remoteAudio = document.getElementById("remoteAudio");
      const voiceSelect = document.getElementById("voiceSelect");
      const logEl = document.getElementById("log");

      let pc = null;
      let dc = null;
      let localStream = null;

      function log(message) {
        const ts = new Date().toLocaleTimeString();
        logEl.textContent += `[${ts}] ${message}\n`;
        logEl.scrollTop = logEl.scrollHeight;
      }

      function setStatus(text) {
        statusEl.textContent = text;
      }

      function safeJsonParse(value) {
        if (typeof value !== "string") return value;
        try {
          return JSON.parse(value);
        } catch {
          return value;
        }
      }

      async function callRag(query) {
        const resp = await fetch("/api/rag", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ query }),
        });
        if (!resp.ok) {
          throw new Error(`RAG request failed (${resp.status})`);
        }
        return await resp.json();
      }

      async function handleFunctionCall(name, callId, rawArguments) {
        if (name !== "rag_query") {
          log(`Ignore unsupported tool: ${name}`);
          return;
        }

        const args = safeJsonParse(rawArguments);
        const query = typeof args?.query === "string" ? args.query : "";
        if (!query) {
          log("Tool rag_query missing query argument");
          return;
        }

        log(`Tool call rag_query: ${query}`);
        const ragResult = await callRag(query);
        const relevantChunks = (ragResult.chunks || []).filter(
          (c) => c.score != null && c.score >= 0.30
        );
        log(`RAG: ${ragResult.chunks?.length || 0} chunks, ${relevantChunks.length} relevant`);

        const NO_MATCH_MSG =
          "NO_MATCH: Knowledge base has no relevant information. " +
          "Chinese user: 不好意思我目前還不熟悉這類問題，請問需要幫您轉接專人協助嗎？ " +
          "English user: Sorry, I'm not familiar with this topic. Would you like me to transfer you to a specialist?";

        const output =
          relevantChunks.length > 0
            ? JSON.stringify({ chunks: relevantChunks })
            : JSON.stringify({ answer: NO_MATCH_MSG });

        dc.send(
          JSON.stringify({
            type: "conversation.item.create",
            item: {
              type: "function_call_output",
              call_id: callId,
              output,
            },
          })
        );

        dc.send(
          JSON.stringify({
            type: "response.create",
            response: {
              modalities: ["audio", "text"],
            },
          })
        );
        log("Sent tool result to AI");
      }

      function registerDataChannel(channel) {
        dc = channel;
        dc.onopen = () => {
          log("Data channel open");

          const instructions = [
            "LANGUAGE RULE:",
            "- Default language is English.",
            "- If the user speaks Chinese (Mandarin/Traditional Chinese/Simplified Chinese), reply in Traditional Chinese (繁體中文).",
            "- If the user speaks English, reply in English.",
            "- If the user speaks any other language, reply in English with: 'Sorry, we currently only support English and Chinese.'",
            "You are KBee, a customer service voice assistant.",
            "Response rules:",
            "1. Greetings (hello, hi, 你好), thanks (thank you, 謝謝), and farewells (bye, 再見) can be answered directly with a short reply. No tool call needed.",
            "2. For ALL other questions, you MUST call the rag_query tool first. Never answer on your own.",
            "3. If the tool result contains an 'answer' field (meaning no relevant data was found), say ONLY: in Chinese '不好意思我目前還不熟悉這類問題，請問需要幫您轉接專人協助嗎？' or in English 'Sorry, I'm not familiar with this topic. Would you like me to transfer you to a specialist?' Do NOT say anything else. Do NOT try to help or give suggestions.",
            "Keep replies concise, friendly, and accurate.",
          ].join(" ");

          dc.send(
            JSON.stringify({
              type: "session.update",
              session: {
                instructions,
                tool_choice: "auto",
                tools: [
                  {
                    type: "function",
                    name: "rag_query",
                    description: "Query KBee knowledge base for factual customer-service answers.",
                    parameters: {
                      type: "object",
                      properties: {
                        query: {
                          type: "string",
                          description: "User question to search in KB.",
                        },
                      },
                      required: ["query"],
                    },
                  },
                ],
              },
            })
          );

          // Wait for session.update to be processed before greeting
          setTimeout(() => {
            dc.send(
              JSON.stringify({
                type: "response.create",
                response: {
                  modalities: ["audio", "text"],
                  instructions: "Briefly introduce yourself in English as KBee customer service assistant and ask the user to start asking questions.",
                },
              })
            );
          }, 500);
        };

        dc.onmessage = async (event) => {
          const data = safeJsonParse(event.data);
          if (!data || typeof data !== "object") return;

          if (data.type === "error") {
            log(`Realtime error: ${JSON.stringify(data.error || data)}`);
            return;
          }

          if (data.type === "response.output_item.done") {
            const item = data.item || {};
            if (item.type === "function_call") {
              try {
                await handleFunctionCall(item.name, item.call_id, item.arguments);
              } catch (err) {
                log(`Tool call error: ${err.message || err}`);
              }
              return;
            }
          }

          if (data.type === "response.text.done") {
            log(`AI(text): ${data.text}`);
          }

          if (data.type === "response.created") {
            remoteAudio.play().catch(() => {});
          }
        };

        dc.onerror = (err) => {
          log(`Data channel error: ${err.message || err}`);
        };

        dc.onclose = () => {
          log("Data channel closed");
        };
      }

      async function startSession() {
        startBtn.disabled = true;
        stopBtn.disabled = false;
        setStatus("Connecting...");

        try {
          const tokenResp = await fetch("/api/realtime-token", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ voice: voiceSelect.value }),
          });

          if (!tokenResp.ok) {
            throw new Error(`Token API failed (${tokenResp.status})`);
          }

          const tokenData = await tokenResp.json();
          const ephemeralKey = tokenData.client_secret?.value;
          const model = tokenData.model;

          if (!ephemeralKey) {
            throw new Error("Missing ephemeral key from server response");
          }

          pc = new RTCPeerConnection();
          pc.ontrack = (event) => {
            remoteAudio.srcObject = event.streams[0];
          };

          if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            throw new Error(
              "getUserMedia not available. Please access this page via https:// or http://localhost:8787"
            );
          }
          localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
          for (const track of localStream.getTracks()) {
            pc.addTrack(track, localStream);
          }

          registerDataChannel(pc.createDataChannel("oai-events"));

          const offer = await pc.createOffer();
          await pc.setLocalDescription(offer);

          const sdpResp = await fetch(`https://api.openai.com/v1/realtime?model=${encodeURIComponent(model)}`, {
            method: "POST",
            headers: {
              Authorization: `Bearer ${ephemeralKey}`,
              "Content-Type": "application/sdp",
            },
            body: offer.sdp,
          });

          if (!sdpResp.ok) {
            throw new Error(`SDP exchange failed (${sdpResp.status})`);
          }

          const answerSdp = await sdpResp.text();
          await pc.setRemoteDescription({ type: "answer", sdp: answerSdp });

          setStatus("Connected");
          log("Realtime session started");
        } catch (err) {
          log(`Start failed: ${err.message || err}`);
          setStatus("Error");
          await stopSession();
        }
      }

      async function stopSession() {
        stopBtn.disabled = true;
        startBtn.disabled = false;

        if (dc) {
          dc.close();
          dc = null;
        }

        if (pc) {
          pc.getSenders().forEach((s) => s.track && s.track.stop());
          pc.close();
          pc = null;
        }

        if (localStream) {
          localStream.getTracks().forEach((t) => t.stop());
          localStream = null;
        }

        setStatus("Idle");
        log("Session stopped");
      }

      startBtn.addEventListener("click", startSession);
      stopBtn.addEventListener("click", stopSession);
    </script>
  </body>
</html>
